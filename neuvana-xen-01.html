<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neuvana Xen Study — Slide 1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,900&family=DM+Mono:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:          #F5F2ED;
    --bg-warm:     #EDE9E3;
    --surface:     #FFFFFF;
    --border:      rgba(0,0,0,0.08);
    --border-dark: rgba(0,0,0,0.12);
    --text-primary:   #1a1a1a;
    --text-secondary: #4a4a4a;
    --text-muted:     #8a8a8a;
    --lime:        #7a9c1e;
    --lime-light:  #c8e64a;
    --lime-bg:     rgba(122,156,30,0.08);
    --lime-border: rgba(122,156,30,0.2);
    --dark:        #1a1a1a;
  }

  body {
    background: #e0ddd8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: 40px 20px;
    gap: 24px;
  }

  /* ══════════════════════════════════════════════
     THE 1080 x 1080 CANVAS — LIGHT
     ══════════════════════════════════════════════ */
  .canvas {
    width: 1080px;
    height: 1080px;
    position: relative;
    background: var(--bg);
    overflow: hidden;
    flex-shrink: 0;
  }

  /* Subtle warm grain texture */
  .grain {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(200,190,170,0.3) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(200,190,170,0.2) 0%, transparent 50%);
    pointer-events: none;
  }

  /* Corner marks — light version */
  .corner {
    position: absolute;
    width: 18px;
    height: 18px;
  }
  .corner.tl { top: 36px; left: 36px; border-top: 1px solid rgba(0,0,0,0.08); border-left: 1px solid rgba(0,0,0,0.08); }
  .corner.tr { top: 36px; right: 36px; border-top: 1px solid rgba(0,0,0,0.08); border-right: 1px solid rgba(0,0,0,0.08); }
  .corner.bl { bottom: 36px; left: 36px; border-bottom: 1px solid rgba(0,0,0,0.08); border-left: 1px solid rgba(0,0,0,0.08); }
  .corner.br { bottom: 36px; right: 36px; border-bottom: 1px solid rgba(0,0,0,0.08); border-right: 1px solid rgba(0,0,0,0.08); }

  /* ── Top label bar ──────────────────────────── */
  .top-label {
    position: absolute;
    top: 58px;
    left: 70px;
    right: 70px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .label-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--lime);
    flex-shrink: 0;
  }
  .label-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    color: var(--lime);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .label-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(122,156,30,0.3), transparent);
  }
  .label-series {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* Thin scan line */
  .scan-line {
    position: absolute;
    left: 70px;
    right: 70px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,0,0,0.06), rgba(0,0,0,0.06), transparent);
  }
  .scan-line.s1 { top: 100px; }

  /* ── Product image area ─────────────────────── */
  .product-area {
    position: absolute;
    top: 120px;
    left: 70px;
    right: 70px;
    height: 560px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 16px;
    background: linear-gradient(160deg, #FAFAF8 0%, #F0EDE8 100%);
    border: 1px solid var(--border);
    overflow: hidden;
  }

  /* SVG illustration of the Xen device */
  .device-illustration {
    position: relative;
    width: 500px;
    height: 440px;
  }

  /* The main hub/body */
  .device-hub {
    position: absolute;
    top: 80px;
    left: 130px;
    width: 240px;
    height: 240px;
    border-radius: 50%;
    background: linear-gradient(145deg, #f8f8f8, #e0e0e0);
    border: 1px solid rgba(0,0,0,0.06);
    box-shadow:
      0 20px 60px rgba(0,0,0,0.08),
      0 4px 16px rgba(0,0,0,0.04),
      inset 0 1px 0 rgba(255,255,255,0.8);
  }

  /* Inner ring on the hub */
  .device-hub-inner {
    position: absolute;
    top: 30px;
    left: 30px;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: linear-gradient(145deg, #ececec, #f5f5f5);
    border: 1px solid rgba(0,0,0,0.04);
  }

  /* LED indicator */
  .device-led {
    position: absolute;
    top: 85px;
    left: 85px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--lime-light);
    box-shadow: 0 0 16px rgba(200,230,74,0.6), 0 0 40px rgba(200,230,74,0.2);
  }

  /* Cable going to left earbud */
  .cable-left {
    position: absolute;
    top: 200px;
    left: 40px;
    width: 100px;
    height: 120px;
  }

  /* Cable going to right earbud */
  .cable-right {
    position: absolute;
    top: 200px;
    right: 40px;
    width: 100px;
    height: 120px;
  }

  /* Earbud tips */
  .earbud {
    position: absolute;
    width: 44px;
    height: 56px;
    border-radius: 22px 22px 18px 18px;
    background: linear-gradient(145deg, #f0f0f0, #d8d8d8);
    border: 1px solid rgba(0,0,0,0.06);
    box-shadow:
      0 8px 24px rgba(0,0,0,0.08),
      inset 0 1px 0 rgba(255,255,255,0.6);
  }
  .earbud-left {
    bottom: 60px;
    left: 60px;
    transform: rotate(-15deg);
  }
  .earbud-right {
    bottom: 60px;
    right: 60px;
    transform: rotate(15deg);
  }

  /* Earbud transparent tip */
  .earbud-tip {
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 16px;
    border-radius: 0 0 10px 10px;
    background: rgba(200,230,74,0.15);
    border: 1px solid rgba(200,230,74,0.25);
    box-shadow: 0 0 12px rgba(200,230,74,0.2);
  }

  /* Floating label */
  .product-label {
    position: absolute;
    bottom: 24px;
    right: 32px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    opacity: 0.6;
  }

  /* ── Headline area ──────────────────────────── */
  .headline-area {
    position: absolute;
    top: 710px;
    left: 70px;
    right: 70px;
  }

  .study-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--lime-bg);
    border: 1px solid var(--lime-border);
    color: var(--lime);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 12px;
    border-radius: 4px;
    margin-bottom: 22px;
  }
  .study-pill::before {
    content: '';
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--lime);
  }

  .main-headline {
    font-size: 48px;
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -0.025em;
    color: var(--text-primary);
    margin-bottom: 18px;
  }
  .main-headline .device-name {
    color: var(--lime);
  }

  .sub-text {
    font-size: 16px;
    line-height: 1.5;
    color: var(--text-muted);
    max-width: 600px;
  }
  .sub-text strong {
    color: var(--text-secondary);
    font-weight: 600;
  }

  /* ── Bottom bar (dark strip) ────────────────── */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 56px;
    background: var(--dark);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 70px;
  }
  .bottom-bar-text {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200,230,74,0.7);
  }
  .bottom-bar-brand {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(200,230,74,0.5);
  }

  /* ── Metric pills (floating on product area) ── */
  .metric-float {
    position: absolute;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }
  .metric-float .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--lime);
  }
  .metric-float.m1 { top: 160px; right: 100px; }
  .metric-float.m2 { top: 260px; right: 80px; }
  .metric-float.m3 { bottom: 160px; left: 100px; }

</style>
</head>
<body>

<!-- ═══ 1080 x 1080 Canvas ═══ -->
<div class="canvas" id="canvas">
  <div class="grain"></div>

  <!-- Corner marks -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!-- Scan line -->
  <div class="scan-line s1"></div>

  <!-- Top label -->
  <div class="top-label">
    <div class="label-dot"></div>
    <div class="label-text">Reputable Study</div>
    <div class="label-line"></div>
    <div class="label-series">Now Enrolling</div>
  </div>

  <!-- Product image area -->
  <div class="product-area">
    <div class="device-illustration">
      <!-- SVG cables -->
      <svg viewBox="0 0 500 440" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;">
        <!-- Left cable -->
        <path d="M 250,200 C 220,240 140,260 102,310" stroke="#d0d0d0" stroke-width="2" fill="none" stroke-linecap="round"/>
        <!-- Right cable -->
        <path d="M 250,200 C 280,240 360,260 398,310" stroke="#d0d0d0" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>

      <!-- Hub -->
      <div class="device-hub">
        <div class="device-hub-inner">
          <div class="device-led"></div>
        </div>
      </div>

      <!-- Earbuds -->
      <div class="earbud earbud-left">
        <div class="earbud-tip"></div>
      </div>
      <div class="earbud earbud-right">
        <div class="earbud-tip"></div>
      </div>
    </div>

    <div class="product-label">Neuvana Xen Device</div>

    <!-- Floating metrics -->
    <div class="metric-float m1"><span class="dot"></span> HRV</div>
    <div class="metric-float m2"><span class="dot"></span> Sleep Quality</div>
    <div class="metric-float m3"><span class="dot"></span> Recovery</div>
  </div>

  <!-- Headline area -->
  <div class="headline-area">
    <div class="study-pill">New Study</div>
    <div class="main-headline">
      The <span class="device-name">Neuvana Xen</span><br>Study
    </div>
    <div class="sub-text">
      Measuring the real-world impact of <strong>vagus nerve stimulation</strong> on HRV, sleep, and recovery — with <strong>wearable-verified data</strong>.
    </div>
  </div>

  <!-- Dark bottom bar -->
  <div class="bottom-bar">
    <span class="bottom-bar-text">Neuvana Xen &mdash; Vagus Nerve Stimulation</span>
    <span class="bottom-bar-brand">Reputable</span>
  </div>
</div>

</body>
</html>
